name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt update
        sudo apt install -y qt6-base-dev libusb-1.0-0-dev zlib1g-dev libgl1-mesa-dev

    - name: Install dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        # Install Chocolatey if not already installed
        if (-Not (Get-Command choco -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy Bypass -Scope Process -Force;
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072;
            iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'));
        }

        # Install CMake and MSYS2 with Chocolatey
        choco install cmake msys2 -y --no-progress

        # Update pacman databases and install required packages
        C:\msys64\usr\bin\bash -lc "pacman -Sy --noconfirm"

        C:\msys64\usr\bin\bash -lc "pacman -S --needed --noconfirm \
          mingw-w64-x86_64-qt6-base \
          mingw-w64-x86_64-qt6-tools \
          mingw-w64-ucrt-x86_64-gcc \
          mingw-w64-x86_64-libusb"
        
        # Set PATH for Qt binaries
        $env:PATH = 'C:\msys64\mingw64\bin;' + $env:PATH

    - name: Configure CMake (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        cmake -B ${{ steps.strings.outputs.build-output-dir }} \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -S ${{ github.workspace }}

    - name: Enable Debugging
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        echo "CMAKE_VERBOSE_MAKEFILE=ON" >> $GITHUB_ENV
        echo "CMAKE_AUTOMOC_VERBOSE=1" >> $GITHUB_ENV

    - name: Add mingw64 to PATH
      if: matrix.os == 'windows-latest'
      run: |
        echo "C:\msys64\mingw64\bin" >> $GITHUB_PATH

    - name: Check moc dependencies
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        ldd /mingw64/share/qt6/bin/moc.exe

    - name: Configure CMake (Windows)
      if: matrix.os == 'windows-latest'
      shell: cmd
      run: |
        cmake -B "%GITHUB_WORKSPACE%\build" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=C:/msys64/mingw64 -S "%GITHUB_WORKSPACE%"

    - name: Build
      run: |
        cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }} --target nfc-spy
