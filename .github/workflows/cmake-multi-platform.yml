name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    # Caching für Windows
    - name: Cache MSYS2 and build artifacts
      if: matrix.os == 'windows-latest'
      uses: actions/cache@v3
      with:
        path: |
          C:/msys64
          ${{ github.workspace }}/build
        key: ${{ runner.os }}-mingw-${{ hashFiles('CMakeLists.txt', 'vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-mingw-

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt update
        sudo apt install -y qt6-base-dev libusb-1.0-0-dev zlib1g-dev libgl1-mesa-dev

    - name: Configure CMake (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        cmake -B ${{ steps.strings.outputs.build-output-dir }} \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -S ${{ github.workspace }}

    - name: Install dependencies (Windows)
      if: matrix.os == 'windows-latest'
      continue-on-error: true
      run: |
        if (-Not (Get-Command choco -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy Bypass -Scope Process -Force;
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072;
            iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'));
        }
        choco install cmake msys2 -y --no-progress
        C:\msys64\usr\bin\bash -lc "pacman -Sy --noconfirm"
        C:\msys64\usr\bin\bash -lc "pacman -S --needed --noconfirm \
          mingw-w64-x86_64-pcre2 \
          mingw-w64-x86_64-qt6-base \
          mingw-w64-x86_64-qt6-tools \
          mingw-w64-ucrt-x86_64-gcc \
          mingw-w64-x86_64-gcc \
          mingw-w64-x86_64-libusb"
        $env:PATH = 'C:\msys64\mingw64\bin;' + $env:PATH
    
    
    - name: Verify PATH
      if: matrix.os == 'windows-latest'
      shell: bash
      continue-on-error: true
      run: |
        echo "Current PATH: $PATH";
        if [[ ":$PATH:" != *":/mingw64/bin:"* ]]; then
          echo "Error: /mingw64/bin not in PATH!" && exit 1;
        fi
    
    - name: Debug workspace path
      if: matrix.os == 'windows-latest'
      shell: cmd
      run: |
        echo "GITHUB_WORKSPACE: %GITHUB_WORKSPACE%"
    
    - name: Locate moc.exe globally
      if: matrix.os == 'windows-latest'
      shell: bash
      continue-on-error: true
      run: |
        find /mingw64 -name "moc.exe" || echo "moc.exe not found anywhere!"
    

    - name: Verify PATH
      if: matrix.os == 'windows-latest'
      shell: bash
      continue-on-error: true
      run: |
        echo "Current PATH: $PATH";
        if [[ ":$PATH:" != *":/mingw64/bin:"* ]]; then
          echo "Error: /mingw64/bin not in PATH!" && exit 1;
        fi
    
    - name: Debug workspace path
      if: matrix.os == 'windows-latest'
      shell: cmd
      run: |
        echo "GITHUB_WORKSPACE: %GITHUB_WORKSPACE%"
    
    - name: Locate moc.exe globally
      if: matrix.os == 'windows-latest'
      shell: bash
      continue-on-error: true
      run: |
        find /mingw64 -name "moc.exe" || echo "moc.exe not found anywhere!"
    
    - name: Configure CMake (Windows)
      if: matrix.os == 'windows-latest'
      shell: cmd
      run: |
        cmake -DCMAKE_BUILD_TYPE=Release -G "CodeBlocks - MinGW Makefiles" -S "%GITHUB_WORKSPACE%" -B "%GITHUB_WORKSPACE%\build" -DCMAKE_PREFIX_PATH=C:/msys64/mingw64 
    
    - name: Build
      run: |
        cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }} --target nfc-spy
